<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseller Login — Spykick's</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --dark: #ffffff;
    --dark2: #1a1a1a;
    --dark3: #222222;
    --mid: #333333;
    --border: #2a2a2a;
    --text: #ffffff;
    --text-muted: #888888;
    --text-dim: #444444;
    --accent: #ffffff;
    --accent-dark: #979797;
    --red: #ff3b30;
    --white: #555555;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    -webkit-font-smoothing: antialiased;
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--black);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    position: relative;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .left-panel::before {
    content: 'Reseller';
    position: absolute;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 280px;
    color: white;
    opacity: 0.02;
    bottom: -40px;
    left: -20px;
    line-height: 1;
    pointer-events: none;
    letter-spacing: -10px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .left-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  .left-content h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 80px;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -2px;
    color: var(--white);
    margin-bottom: 28px;
  }

  .left-content h1 span {
    color: var(--accent);
    display: block;
  }

  .left-content p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
    max-width: 320px;
    margin-bottom: 36px;
  }

  .perks {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .perk {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .perk-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .left-footer {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 64px;
    background: rgb(204, 204, 204);
  }

  .form-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    background: var(--dark2);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .form-group input:focus {
    border-color: var(--accent);
    background: var(--dark3);
  }

  .form-group input::placeholder { color: var(--text-dim); }

  .btn-primary {
    width: 100%;
    background: black;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 16px 24px;
    border: none;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-primary:disabled { background: #555; cursor: not-allowed; transform: none; }

  .error-msg {
    background: rgba(255,59,48,0.1);
    border: 1px solid rgba(255,59,48,0.3);
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--red);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    display: none;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
  }

  .back-link:hover { color: var(--text-muted); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left-panel { display: none; }
    .right-panel { padding: 40px 24px; min-height: 100vh; }
    .btn-primary { font-size: 14px; padding: 18px 24px; }
    .form-group input { font-size: 16px; /* prevents iOS zoom */ padding: 16px 18px; }
    .back-link { margin-top: 32px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <a href="https://spykicks-production.up.railway.app/index.html" class="logo">Spykick's</a>

  <div class="left-content">
    <div class="eyebrow">Reseller Access</div>
    <h1>Your Reseller<span>Account.</span></h1>
    <p>Exclusive reseller pricing — enter your approved email to access the dashboard.</p>
  </div>

  <div class="left-footer">© 2026 Spykick's</div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="form-label">Reseller Login</div>
  <div id="errorMsg" class="error-msg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-primary" id="loginBtn" onclick="login()">Access Dashboard</button>

  <a href="https://spykicks-production.up.railway.app/index.html" class="back-link">← Back to store</a>
</div>

<script>
if (window.location.protocol === 'file:') {
  window.location.replace('https://spykicks-production.up.railway.app/vip-login.html' + window.location.search);
}

window.onload = async () => {
  // If already logged in, go straight to dashboard
  const saved = localStorage.getItem("resellerEmail");
  if (saved) {
    window.location.href = "https://spykicks-production.up.railway.app/reseller-products.html";
    return;
  }

  // Pre-fill email from URL param (from admin approval link or elsewhere)
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (email) {
    document.getElementById("email").value = email;
  }
};

async function login() {
  const email = document.getElementById("email").value.trim();
  const errEl = document.getElementById("errorMsg");
  const btn = document.getElementById("loginBtn");

  if (!email) {
    showError("Please enter your email address.");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Checking...";
  errEl.style.display = "none";

  try {
    const res = await fetch("/check-user", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (data.verified) {
      localStorage.setItem("resellerEmail", email);
      window.location.href = "https://spykicks-production.up.railway.app/reseller-products.html";
    } else {
      showError("This email is not approved as a reseller. Please apply first or contact admin.");
      btn.disabled = false;
      btn.textContent = "Access Dashboard";
    }
  } catch (err) {
    showError("Connection error. Please try again.");
    btn.disabled = false;
    btn.textContent = "Access Dashboard";
  }
}

function showError(msg) {
  const errEl = document.getElementById("errorMsg");
  errEl.textContent = msg;
  errEl.style.display = "block";
}
</script>

</body>
</html>
